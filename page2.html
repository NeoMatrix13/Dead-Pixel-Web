<!DOCTYPE html>
<html>
<head>
    <title>Homepage</title>
    <style>
        body {
            background-image: url("https://www.transparenttextures.com/patterns/cartographer.png");
            background-color: black;
            color: lime;
            font-family: "Courier New", cursive;
            text-align: center;
        }

        table {
            margin: auto;
            border: 3px solid yellow;
            background-color: #7d8bd2;
            width: 800px;
        }

        td {
            padding: 10px;
            border: 1px solid cyan;
        }

        a {
            color: cyan;
            text-decoration: none;
        }

        a:hover {
            color: yellow;
            text-decoration: underline;
        }

        .blink {
            animation: blink 1s infinite;
        }

        @keyframes blink {
            0% { opacity: 1; }
            50% { opacity: 0; }
            100% { opacity: 1; }
        }

        .counter {
            background: black;
            color: red;
            font-family: monospace;
            padding: 5px;
            border: 2px inset gray;
            display: inline-block;
        }
    </style>
</head>

<body>

    <marquee behavior="scroll" direction="left" scrollamount="5">
      * UNDER CONSTRUCTION *
    </marquee>

    <h1 class="blink">Page 2</h1>

    <table>
        <tr>
            <td colspan="2">
                <h2>A website to upload creative content</h2>
            </td>
        </tr>

        <tr>

            <td>                            
                <p class="blink">** Under Construction **</p>

                <br>
               
            </td>
        </tr>

        <tr>
            <td colspan="2">
                <h3>Go Back</h3>

                <p>
                    <img src="https://media.giphy.com/media/Kau9HDsfOQClgQLjWV/giphy.gif"height="200" width="200">
                </p>
            </td>
        </tr>
    </table>

    <marquee behavior="scroll"> Thanks for visiting</marquee>

</body>
</html>
